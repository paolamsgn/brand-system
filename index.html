<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Brand System - Design System Agnostico</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0c0e;--surface:#151518;--surface2:#1c1c21;--surface3:#24242b;
  --border:#2a2a33;--border2:#3a3a45;
  --text:#e8e6e3;--text2:#9d9ba0;--text3:#6b6970;
  --accent:#a78bfa;--accent2:#7c3aed;--accent-dim:rgba(167,139,250,.12);
  --green:#34d399;--green-dim:rgba(52,211,153,.12);
  --yellow:#fbbf24;--yellow-dim:rgba(251,191,36,.12);
  --red:#f87171;--red-dim:rgba(248,113,113,.12);
  --orange:#fb923c;--orange-dim:rgba(251,146,60,.12);
  --blue:#60a5fa;--blue-dim:rgba(96,165,250,.12);
  --gold:#fbbf24;--silver:#94a3b8;--bronze:#fb923c;
  --font:'DM Sans',system-ui,sans-serif;
  --mono:'JetBrains Mono',monospace;
  --radius:10px;--radius-sm:6px;--radius-lg:14px;
}
html{font-size:15px;background:var(--bg);color:var(--text);font-family:var(--font)}
body{min-height:100vh}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
::selection{background:var(--accent);color:#fff}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

.app-shell{display:flex;min-height:100vh}
.sidebar{width:240px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:10}
.sidebar-logo{padding:20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sidebar-logo .logo-mark{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:14px}
.sidebar-logo .logo-text{font-weight:600;font-size:15px;letter-spacing:-.02em}
.sidebar-logo .logo-sub{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-top:1px}
.sidebar-nav{flex:1;padding:12px 8px;overflow-y:auto}
.nav-section{margin-bottom:16px}
.nav-section-title{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);padding:4px 12px 6px;font-weight:500}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 12px;border-radius:var(--radius-sm);cursor:pointer;font-size:13.5px;color:var(--text2);transition:all .15s;user-select:none}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--accent-dim);color:var(--accent);font-weight:500}
.nav-item .nav-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.nav-item .nav-badge{margin-left:auto;font-size:10px;background:var(--surface3);padding:2px 7px;border-radius:10px;font-weight:500;font-family:var(--mono)}

.main-content{margin-left:240px;flex:1;min-height:100vh}
.topbar{height:52px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 28px;gap:12px;background:var(--surface);position:sticky;top:0;z-index:5}
.topbar-title{font-weight:600;font-size:14px}
.topbar-sep{color:var(--text3);font-size:12px}
.topbar-sub{color:var(--text2);font-size:13px}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.topbar-tag{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500;letter-spacing:.02em}
.topbar-tag.orbit{background:var(--blue-dim);color:var(--blue)}

.page-content{padding:28px;max-width:960px}
.page-header{margin-bottom:28px}
.page-header h1{font-size:22px;font-weight:700;letter-spacing:-.03em;margin-bottom:4px}
.page-header p{color:var(--text2);font-size:13.5px;line-height:1.5}

/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:12px}
.card-sm{padding:14px 16px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.card-header h3{font-size:14px;font-weight:600}

/* Sections */
.section-group{margin-bottom:32px}
.section-group-title{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.section-group-title h2{font-size:16px;font-weight:700;letter-spacing:-.02em}
.section-group-title .sg-badge{font-size:10px;padding:3px 10px;border-radius:20px;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.sg-badge.bs{background:var(--accent-dim);color:var(--accent)}
.sg-badge.cds{background:var(--green-dim);color:var(--green)}

/* Checklist section */
.checklist-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;overflow:hidden;transition:border-color .2s}
.checklist-section.expanded{border-color:var(--border2)}
.checklist-section-header{display:flex;align-items:center;gap:12px;padding:14px 18px;cursor:pointer;user-select:none;transition:background .15s}
.checklist-section-header:hover{background:var(--surface2)}
.section-num{font-size:11px;font-family:var(--mono);color:var(--text3);width:28px;flex-shrink:0;font-weight:500}
.section-title{font-size:13.5px;font-weight:600;flex:1}
.section-orbit{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--blue-dim);color:var(--blue);font-weight:500;margin-right:4px;white-space:nowrap}
.section-progress{font-size:11px;font-family:var(--mono);color:var(--text3);margin-right:4px}
.section-bar{width:48px;height:4px;background:var(--surface3);border-radius:2px;overflow:hidden;margin-right:4px}
.section-bar-fill{height:100%;border-radius:2px;transition:width .3s}
.section-chevron{color:var(--text3);font-size:14px;transition:transform .2s}
.checklist-section.expanded .section-chevron{transform:rotate(90deg)}
.section-body{padding:0 18px 16px 58px;display:none}
.checklist-section.expanded .section-body{display:block}
.section-orbit-info{font-size:12px;color:var(--blue);background:var(--blue-dim);padding:8px 12px;border-radius:var(--radius-sm);margin-bottom:12px;line-height:1.5}
.section-orbit-info code{font-family:var(--mono);font-size:11px;background:rgba(96,165,250,.15);padding:1px 5px;border-radius:3px}

/* Checkbox items */
.check-item{display:flex;align-items:flex-start;gap:10px;padding:6px 0}
.check-item label{display:flex;align-items:flex-start;gap:10px;cursor:pointer;flex:1;font-size:13px;line-height:1.5;color:var(--text2)}
.check-item label:hover{color:var(--text)}
.check-item input[type=checkbox]{appearance:none;-webkit-appearance:none;width:16px;height:16px;border:1.5px solid var(--border2);border-radius:4px;flex-shrink:0;margin-top:2px;cursor:pointer;transition:all .15s;position:relative}
.check-item input[type=checkbox]:checked{background:var(--accent);border-color:var(--accent)}
.check-item input[type=checkbox]:checked::after{content:'';position:absolute;top:2px;left:5px;width:4px;height:8px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg)}
.check-item.checked label{color:var(--text3);text-decoration:line-through;text-decoration-color:var(--border2)}
.check-item .item-id{font-family:var(--mono);font-size:11px;color:var(--text3);flex-shrink:0;min-width:28px}

/* Radio items (tier) */
.radio-group{display:flex;flex-direction:column;gap:6px}
.radio-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;transition:all .15s}
.radio-item:hover{border-color:var(--border2);background:var(--surface2)}
.radio-item.selected{border-color:var(--accent);background:var(--accent-dim)}
.radio-item input[type=radio]{appearance:none;-webkit-appearance:none;width:16px;height:16px;border:1.5px solid var(--border2);border-radius:50%;flex-shrink:0;cursor:pointer;transition:all .15s;position:relative}
.radio-item.selected input[type=radio]{border-color:var(--accent);background:var(--accent)}
.radio-item.selected input[type=radio]::after{content:'';position:absolute;top:4px;left:4px;width:6px;height:6px;background:#fff;border-radius:50%}
.radio-item .radio-label{font-size:13px;font-weight:500}
.radio-item .radio-desc{font-size:11.5px;color:var(--text3);margin-top:1px}

/* Notes */
.note-field{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px;color:var(--text);font-family:var(--font);font-size:12.5px;resize:vertical;min-height:56px;margin-top:8px;outline:none;transition:border-color .15s}
.note-field:focus{border-color:var(--accent)}
.note-field::placeholder{color:var(--text3)}

/* Progress */
.progress-ring{display:flex;align-items:center;gap:16px}
.progress-circle{position:relative;width:80px;height:80px}
.progress-circle svg{transform:rotate(-90deg)}
.progress-circle .track{fill:none;stroke:var(--surface3);stroke-width:6}
.progress-circle .fill{fill:none;stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset .6s ease}
.progress-circle .pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;font-family:var(--mono)}
.progress-stats{display:flex;flex-direction:column;gap:4px}
.progress-stat{display:flex;align-items:center;gap:8px;font-size:12.5px}
.progress-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* Tabs */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:20px}
.tab{padding:10px 18px;font-size:13px;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;font-weight:500}
.tab:hover{color:var(--text2)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* Workflow cards */
.wf-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:10px}
.wf-card h3{font-size:14px;font-weight:600;margin-bottom:4px}
.wf-card p{font-size:12.5px;color:var(--text2);line-height:1.5}
.wf-steps{margin-top:14px;display:flex;flex-direction:column;gap:0}
.wf-step{display:flex;gap:12px;padding:10px 0;position:relative}
.wf-step:not(:last-child)::after{content:'';position:absolute;left:11px;top:32px;bottom:0;width:1px;background:var(--border)}
.wf-step-num{width:22px;height:22px;background:var(--surface3);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;font-family:var(--mono);flex-shrink:0;z-index:1}
.wf-step-text{font-size:12.5px;color:var(--text2);line-height:1.5;padding-top:2px}
.wf-step-text code{font-family:var(--mono);font-size:11px;background:var(--surface3);padding:1px 5px;border-radius:3px;color:var(--text)}

/* Registry table */
.reg-table{width:100%;border-collapse:separate;border-spacing:0;font-size:12.5px}
.reg-table th{text-align:left;padding:8px 12px;font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);font-weight:500;border-bottom:1px solid var(--border);white-space:nowrap}
.reg-table td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
.reg-table tr:hover td{background:var(--surface2)}
.status-badge{font-size:10.5px;padding:3px 10px;border-radius:20px;font-weight:500;display:inline-block;white-space:nowrap}
.status-badge.draft{background:rgba(100,116,139,.15);color:#94a3b8}
.status-badge.review{background:var(--accent-dim);color:var(--accent)}
.status-badge.active{background:var(--green-dim);color:var(--green)}
.tier-badge{font-size:11px;font-weight:500}
.pct-badge{font-size:11px;font-family:var(--mono);font-weight:500}
.pct-badge.p100{color:var(--green)}
.pct-badge.p75{color:var(--yellow)}
.pct-badge.p50{color:var(--orange)}
.pct-badge.p25{color:var(--red)}
.pct-badge.p0{color:var(--text3)}
.orbit-check{color:var(--blue);font-size:14px}

/* Dashboard stats */
.dash-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px}
.dash-stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.dash-stat .ds-value{font-size:28px;font-weight:700;font-family:var(--mono);letter-spacing:-.03em}
.dash-stat .ds-label{font-size:11px;color:var(--text3);margin-top:2px;text-transform:uppercase;letter-spacing:.06em}

/* Tier summary in dashboard */
.tier-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px}
.tier-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center}
.tier-card .tier-icon{font-size:28px;margin-bottom:4px}
.tier-card .tier-name{font-size:13px;font-weight:600;margin-bottom:8px}
.tier-card .tier-detail{font-size:11.5px;color:var(--text2);line-height:1.5}
.tier-card .tier-pts{font-family:var(--mono);font-size:12px;color:var(--accent);margin-top:6px;font-weight:500}

/* Orbit link banner */
.orbit-banner{background:linear-gradient(135deg,rgba(96,165,250,.08),rgba(167,139,250,.08));border:1px solid rgba(96,165,250,.2);border-radius:var(--radius);padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;gap:14px}
.orbit-banner .ob-icon{font-size:24px}
.orbit-banner .ob-text{flex:1}
.orbit-banner .ob-title{font-size:13px;font-weight:600;color:var(--blue);margin-bottom:2px}
.orbit-banner .ob-desc{font-size:12px;color:var(--text2);line-height:1.4}

@media(max-width:768px){
  .sidebar{display:none}
  .main-content{margin-left:0}
  .dash-grid{grid-template-columns:repeat(2,1fr)}
  .tier-summary{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback, useEffect, useMemo } = React;

/* ── DATA ── */
const SECTIONS_BS = [
  { id:'01', title:'Assets SVG', orbit:null,
    items:['Logo principale in SVG','Variante monocromatica (bianco/nero)','Favicon o simbolo standalone','Versione orizzontale e verticale'] },
  { id:'02', title:'Palette Colori', orbit:'brand.primary / secondary / accent',
    orbitInfo:'Verificare che la famiglia colore esista in global.colors.*. Mappare in semantic.brand.primary/secondary/accent.',
    items:['Colore primario (hex + token)','Colore secondario','Colore accent','Varianti dark/light per ciascun colore','Colori neutri (background, surface, border)'] },
  { id:'03', title:'Iconografia', orbit:'Orbit Icon Set',
    orbitInfo:'Icone SOLO da Orbit Icon Set (file 17NOUwOPgzG4NDS1jfGHHl). Registrare via Arbiter prima di aggiungere ai switcher.',
    items:['Set di icone definito (outline / filled / duotone)','Stile coerente col brand','Formato SVG o icon font','Icone custom necessarie?'] },
  { id:'04', title:'Tier del Brand', orbit:null,
    items:[], tier:true },
  { id:'05', title:'Tipografia', orbit:'brand.fontMapping.*',
    orbitInfo:'Catena 3 livelli: global.typography > semantic.brand.fontMapping.title/paragraph > semantic.brand.textStyle. PostScript names obbligatori.',
    items:['Font primario (heading)','Font secondario (body/UI)','Fallback web-safe definito','Licenza d\'uso verificata','Scala tipografica concordata'] },
  { id:'06', title:'Tono e Voce', orbit:null,
    items:['Brand voice definita (formale / informale / tecnica)','Lingua principale dell\'interfaccia','Keyword vietate o sensibili','Claim o payoff ufficiale'] },
  { id:'07', title:'Spaziature e Radius', orbit:'brand.radius.*',
    orbitInfo:'brand.radius.component (2xs-sm), brand.radius.containerSm, brand.radius.containerLg. ATTENZIONE: brand.radius.main NON esiste.',
    items:['Preferenza angoli (netti / arrotondati / molto arrotondati)','Scale di spacing custom o DS base?','Densita UI (compact / default / comfortable)'] },
  { id:'08', title:'Componenti Prioritari', orbit:'definitions.* + mixins.*',
    orbitInfo:'14 componenti nel token system, 147 spec JSON dev. Pelican ha differenze specifiche (button.fontPreset = body2, paddingX = spacing.sm).',
    items:['Button','Card','Navigation / Header','Form elements','Altri componenti custom'] },
  { id:'09', title:'Dark Mode', orbit:null,
    items:['Il brand supporta la dark mode?','Palette dark dedicata o generata automaticamente?','Contrasto WCAG verificato?'] },
  { id:'10', title:'Deliverable e Owner', orbit:null,
    items:['Brand guideline PDF disponibile?','Figma file condiviso?','Chi approva gli asset definitivi?','Referente lato cliente identificato'] },
];

const SECTIONS_CDS = [
  { id:'11', title:'UX Writing e Microcopy', orbit:'brand.textStyle.*',
    orbitInfo:'Lunghezze max label/CTA dipendono dai text style e dalle font metrics per brand (Gotham vs General Sans hanno resa diversa).',
    tierReq:{gold:true,silver:true,bronze:false},
    items:['Label guidelines (form, navigation, header, tab)','CTA framework: gerarchia primario / secondario / terziario','Pattern messaggi errore: Cosa e successo + Come risolvere','Pattern messaggi successo e feedback positivo','Copy empty states (headline + body + CTA)','Copy loading states (progressive disclosure)','Tooltip e helper text: regole lunghezza, trigger','Placeholder text: mai label replacement'] },
  { id:'12', title:'Tono e Voce Espanso', orbit:'brand.fontMapping.title/paragraph',
    orbitInfo:'Font choice influenza percezione tono. Font geometrici (Gotham) = tono tecnico. Font umanisti (General Sans) = tono caldo.',
    tierReq:{gold:true,silver:true,bronze:false},
    items:['Brand voice pillars: 3-5 aggettivi con significato e anti-pattern','Tono scale: matrice contesto x tono','Do\'s e Don\'ts per contesto: almeno 3 esempi prima/dopo','Guida tono per canale: app UI, email, notifiche push, onboarding','Content samples: 5+ rewrite che mostrano la brand voice'] },
  { id:'13', title:'Editorial e Content Types', orbit:'semantic.brand.textStyle.headLine/body/caption',
    orbitInfo:'Ogni content type mappa su un text style Orbit. headLine.01 = H1, headLine.02 = H2, body1.bold = sottotitolo, body1.regular = corpo, caption = metadata.',
    tierReq:{gold:true,silver:false,bronze:false},
    items:['Headline hierarchy: H1-H4 con regole d\'uso e lunghezza max','Body copy guidelines: lunghezza per schermata, leggibilita','Content templates: Card, Modal, Onboarding step, Notifica','Guida numeri, date, valute (formato locale IT)','Punteggiatura e capitalizzazione (sentence case vs title case)','SEO e metadata: title tag, meta description, alt text'] },
  { id:'14', title:'Naming e Terminologia', orbit:'Naming conventions Orbit',
    orbitInfo:'Convenzioni: has* per booleani, camelCase, subtle (non muted), instance swap. Glossario deve includere termini standard Orbit.',
    tierReq:{gold:true,silver:true,bronze:false},
    items:['Glossario ufficiale prodotto (almeno 10 termini + standard Orbit)','Naming componenti UI: corrispondenza nome DS / nome prodotto','Banned terms: termini legali, sensibili, deprecati','Terminologia dev: naming convention token, variabili CSS','Strategia localizzazione: lingue supportate, plurali, date'] },
];

const WORKFLOWS = [
  { id:'covenant', title:'Covenant Push', desc:'Push dei design token dal plugin Covenant verso il repository GitHub.',
    steps:['Apri Covenant in Figma','Seleziona le collezioni da esportare','Verifica il diff dei token modificati','Push verso il branch designato','Verifica la CI/CD pipeline su GitLab'] },
  { id:'gradient', title:'Creazione Gradiente', desc:'Workflow per creare un gradiente agganciato al sistema di variabili.',
    steps:['Crea un rettangolo in Figma','Applica gradient fill (linear o radial)','Aggancia i color stop alle variabili brand','Verifica il cambio automatico tra brand/mode','Registra il gradiente come style condiviso'] },
  { id:'icon', title:'Nuova Icona', desc:'Aggiunta di una nuova icona alla libreria Orbit Icon Set.',
    steps:['Prepara SVG ottimizzato (outline, 24x24)','Apri Arbiter nel file Orbit Icon Set','Registra la nuova icona via Arbiter','Verifica la detection nel switcher','Pubblica la libreria aggiornata'] },
  { id:'typo', title:'Typography Pipeline', desc:'Pipeline completa per la tokenizzazione tipografica di un nuovo brand.',
    steps:['Aggiungi font a global.typography.fontsName','Configura brand.fontMapping.title e paragraph','Popola PostScript names (bold, medium, regular)','Genera textStyle via catena 3 livelli','Verifica rendering in Figma con CovenantPluginV2','Esporta token e verifica output JSON'] },
];

const DEMO_BRANDS = [
  { name:'Lumina', emoji:'sparkles', tier:'gold', status:'active', bs:100, cds:100, orbit:true },
];

function makeBrandState() {
  const checks = {};
  [...SECTIONS_BS, ...SECTIONS_CDS].forEach(s => {
    s.items.forEach((_, i) => { checks[s.id + '-' + i] = false; });
  });
  return { tier: null, checks, notes: {} };
}

/* ── COMPONENTS ── */

function ProgressCircle({ pct, size=80, stroke=6, color='var(--accent)' }) {
  const r = (size - stroke) / 2;
  const circ = 2 * Math.PI * r;
  const offset = circ - (pct / 100) * circ;
  const col = pct === 100 ? 'var(--green)' : pct >= 75 ? 'var(--yellow)' : pct >= 50 ? 'var(--orange)' : pct > 0 ? 'var(--red)' : 'var(--text3)';
  return (
    React.createElement("div", {className:"progress-circle", style:{width:size,height:size}},
      React.createElement("svg", {width:size, height:size},
        React.createElement("circle", {className:"track", cx:size/2, cy:size/2, r:r, strokeWidth:stroke}),
        React.createElement("circle", {className:"fill", cx:size/2, cy:size/2, r:r, strokeWidth:stroke, stroke:col,

function Section({ section, brandState, onCheck, onTierChange, isCDS }) {
  const [expanded, setExpanded] = useState(false);
  const done = section.items.filter((_, i) => brandState.checks[section.id + '-' + i]).length;
  const total = section.items.length;
  const pct = total > 0 ? Math.round(done / total * 100) : (section.tier && brandState.tier ? 100 : 0);
  const barColor = pct === 100 ? 'var(--green)' : pct >= 50 ? 'var(--yellow)' : pct > 0 ? 'var(--orange)' : 'var(--surface3)';

  return (
    React.createElement("div", {className:'checklist-section' + (expanded ? ' expanded' : '')},
      React.createElement("div", {className:"checklist-section-header", onClick:() => setExpanded(!expanded)},
        React.createElement("span", {className:"section-num"}, section.id),
        React.createElement("span", {className:"section-title"}, section.title),
        section.orbit && React.createElement("span", {className:"section-orbit"}, '\u26A1 Orbit'),
        !section.tier && React.createElement("span", {className:"section-progress"}, done + '/' + total),
        !section.tier && React.createElement("div", {className:"section-bar"},
          React.createElement("div", {className:"section-bar-fill", style:{width:pct+'%', background:barColor}})
        ),
        section.tier && React.createElement("span", {className:"section-progress"}, brandState.tier ? '\u2713' : '-'),
        React.createElement("span", {className:"section-chevron"}, '\u25B6')
      ),
      React.createElement("div", {className:"section-body"},
        section.orbitInfo && React.createElement("div", {className:"section-orbit-info"},
          '\u26A1 ', section.orbitInfo
        ),
        isCDS && section.tierReq && React.createElement("div", {style:{fontSize:11.5,color:'var(--text3)',marginBottom:10}},
          'Obbligatorio: ',
          section.tierReq.gold && '\uD83E\uDD47 Gold ',
          section.tierReq.silver && '\uD83E\uDD48 Silver ',
          !section.tierReq.gold && !section.tierReq.silver && '\uD83E\uDD49 Bronze solo',
          !section.tierReq.bronze && ' | Non richiesto per Bronze'
        ),
        section.tier
          ? React.createElement(TierSelector, {value:brandState.tier, onChange:onTierChange})
          : section.items.map((item, i) =>
              React.createElement(ChecklistItem, {
                key:section.id+'-'+i, id:section.id+'-'+i, label:item,
                checked:brandState.checks[section.id+'-'+i],
                onChange:onCheck
              })
            )
      )
    )
  );
}

function calcProgress(brandState) {
  const bsItems = SECTIONS_BS.flatMap((s,si) => s.items.map((_,i) => s.id+'-'+i));
  const cdsItems = SECTIONS_CDS.flatMap((s,si) => s.items.map((_,i) => s.id+'-'+i));
  const bsDone = bsItems.filter(k => brandState.checks[k]).length + (brandState.tier ? 1 : 0);
  const bsTotal = bsItems.length + 1;
  const cdsDone = cdsItems.filter(k => brandState.checks[k]).length;
  const cdsTotal = cdsItems.length;
  const tier = brandState.tier || 'gold';
  let reqCDS = cdsTotal;
  if (tier === 'silver') reqCDS = SECTIONS_CDS.filter(s => s.tierReq.silver).flatMap(s => s.items).length;
  if (tier === 'bronze') reqCDS = SECTIONS_CDS.filter(s => s.tierReq.bronze).flatMap(s => s.items).length;
  const totalReq = bsTotal + reqCDS;
  const totalDone = bsDone + Math.min(cdsDone, reqCDS);
  return {
    bsPct: Math.round(bsDone / bsTotal * 100),
    cdsPct: cdsTotal > 0 ? Math.round(cdsDone / cdsTotal * 100) : 0,
    totalPct: totalReq > 0 ? Math.round(totalDone / totalReq * 100) : 0,
    bsDone, bsTotal, cdsDone, cdsTotal, totalDone, totalReq
  };
}
